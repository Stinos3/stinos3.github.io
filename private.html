<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private — Stijn Geerts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --border2: #3d444d;
    --text: #e6edf3; --text2: #8b949e; --text3: #656d76;
    --accent: #58a6ff; --accent2: #1f6feb;
    --green: #3fb950; --orange: #d29922; --purple: #bc8cff; --red: #f85149;
    --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 0 2rem; position: sticky; top: 0; background: rgba(13,17,23,0.92); backdrop-filter: blur(8px); z-index: 100; }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .logo .prompt { color: var(--green); }
  .logo .cursor { display: inline-block; width: 8px; height: 14px; background: var(--accent); animation: blink 1.1s step-end infinite; vertical-align: middle; }
  @keyframes blink { 50% { opacity: 0; } }
  nav a { font-family: var(--mono); font-size: 12px; color: var(--text2); text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
  nav a:hover { color: var(--text); background: var(--bg3); }

  /* LOGIN SCREEN */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 56px); }
  .login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; width: 320px; }
  .lock-icon { font-size: 40px; margin-bottom: 16px; }
  .login-box h2 { font-family: var(--mono); font-size: 16px; margin-bottom: 8px; }
  .login-box p { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
  .pw-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 16px; text-align: center; letter-spacing: 0.2em; margin-bottom: 12px; outline: none; transition: border-color 0.15s; }
  .pw-input:focus { border-color: var(--accent); }
  .pw-input.error { border-color: var(--red); animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .login-btn { width: 100%; background: var(--accent2); border: 1px solid var(--accent); border-radius: 8px; padding: 10px; color: #fff; font-family: var(--mono); font-size: 13px; cursor: pointer; transition: opacity 0.15s; }
  .login-btn:hover { opacity: 0.85; }
  .error-msg { font-size: 12px; color: var(--red); font-family: var(--mono); margin-top: 8px; min-height: 16px; }

  /* MAIN CONTENT */
  #main-content { display: none; max-width: 1100px; margin: 0 auto; padding: 2rem; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 12px; }
  .top-bar h1 { font-family: var(--mono); font-size: 18px; }
  .top-bar button { font-family: var(--mono); font-size: 12px; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .top-bar button:hover { color: var(--text); border-color: var(--border2); }

  /* SECTION */
  .section { margin-bottom: 2.5rem; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-title { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .section-title .count { font-size: 10px; background: var(--bg3); border: 1px solid var(--border); padding: 2px 7px; border-radius: 10px; color: var(--text3); }
  .add-btn { font-family: var(--mono); font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .add-btn:hover { border-color: var(--green); color: var(--green); }

  /* ITEM ROWS */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-row { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; transition: border-color 0.15s; }
  .item-row:hover { border-color: var(--border2); }
  .item-body { flex: 1; min-width: 0; }
  .item-name { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .item-note { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .item-link { font-family: var(--mono); font-size: 11px; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; }
  .item-link:hover { text-decoration: underline; }
  .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 12px; color: var(--text3); transition: all 0.15s; }
  .icon-btn:hover { border-color: var(--border2); color: var(--text); }
  .icon-btn.del:hover { border-color: var(--red); color: var(--red); }

  .priority-badge { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 4px; border: 1px solid; white-space: nowrap; }
  .p-high   { color: var(--red);    border-color: #b62324; background: rgba(248,81,73,0.1); }
  .p-medium { color: var(--orange); border-color: #9e6a03; background: rgba(210,153,34,0.1); }
  .p-low    { color: var(--text3);  border-color: var(--border); background: transparent; }

  .owned-badge { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 4px; color: var(--green); border: 1px solid #238636; background: rgba(63,185,80,0.1); }

  /* MODAL */
  .priv-tab { font-family: var(--mono); font-size: 13px; color: var(--text2); padding: 10px 20px; cursor: pointer; border: none; border-bottom: 2px solid transparent; background: none; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
  .priv-tab:hover { color: var(--text); }
  .priv-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* RESEARCH STYLES */
  .research-grid { display: grid; grid-template-columns: 220px 1fr; gap: 20px; min-height: 600px; }
  .research-sidebar { display: flex; flex-direction: column; gap: 8px; }
  .res-cat-btn { font-family: var(--mono); font-size: 12px; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
  .res-cat-btn:hover { border-color: var(--border2); color: var(--text); }
  .res-cat-btn.active { background: var(--bg3); border-color: var(--accent); color: var(--text); }
  .res-cat-btn .res-count { margin-left: auto; font-size: 10px; background: var(--bg3); border: 1px solid var(--border); padding: 1px 6px; border-radius: 10px; color: var(--text3); }
  .res-cat-btn.active .res-count { background: var(--accent2); border-color: var(--accent); color: #fff; }
  .research-main { display: flex; flex-direction: column; gap: 12px; }
  .res-toolbar { display: flex; gap: 8px; align-items: center; }
  .res-search { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color 0.15s; }
  .res-search:focus { border-color: var(--accent); }
  .res-entry { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; transition: border-color 0.15s; }
  .res-entry:hover { border-color: var(--border2); }
  .res-entry-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .res-entry-title { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text); }
  .res-entry-cat { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); color: var(--text3); background: var(--bg3); white-space: nowrap; }
  .res-entry-body { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 8px; }
  .res-entry-links { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  .res-link { font-family: var(--mono); font-size: 11px; color: var(--accent); text-decoration: none; }
  .res-link:hover { text-decoration: underline; }
  .res-entry-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .res-tag { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
  .res-used { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 4px; color: var(--green); border: 1px solid #238636; background: rgba(63,185,80,0.1); }
  .empty-state { font-family: var(--mono); font-size: 12px; color: var(--text3); padding: 40px; text-align: center; background: var(--bg2); border: 1px dashed var(--border); border-radius: 10px; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 440px; max-width: 95vw; }
  .modal h3 { font-family: var(--mono); font-size: 14px; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-family: var(--mono); font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-group select option { background: var(--bg3); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-actions button { font-family: var(--mono); font-size: 12px; padding: 8px 18px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .modal-actions button.save { background: var(--accent2); border-color: var(--accent); color: #fff; }
  .modal-actions button:hover { border-color: var(--border2); color: var(--text); }
  .modal-actions button.save:hover { opacity: 0.85; }

  .empty-state { font-family: var(--mono); font-size: 12px; color: var(--text3); padding: 20px; text-align: center; background: var(--bg2); border: 1px dashed var(--border); border-radius: 10px; }
</style>

<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo"><span class="prompt">~/</span>stijn-geerts<span class="cursor"></span></a>
    <nav><a href="index.html">← back</a></nav>
  </div>
</header>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="lock-icon">🔒</div>
    <h2>Private Area</h2>
    <p>Enter password to continue</p>
    <input type="password" class="pw-input" id="pwInput" placeholder="••••" maxlength="10" autocomplete="off">
    <button class="login-btn" id="loginBtn">Unlock</button>
    <div class="error-msg" id="errMsg"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content">
  <div class="top-bar">
    <h1>🔓 Private Dashboard</h1>
    <button onclick="logout()">🔒 Lock</button>
  </div>

  <!-- PRIVATE TABS -->
  <div style="border-bottom:1px solid var(--border);margin-bottom:2rem;">
    <div style="display:flex;gap:0;">
      <button class="priv-tab active" data-ptab="dashboard">📋 Dashboard</button>
      <button class="priv-tab" data-ptab="research">🔬 Research</button>
    </div>
  </div>
  <div id="ptab-dashboard">

  <!-- TOOLS WISHLIST -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">🛒 Tools Wishlist <span class="count" id="wish-count">0</span></div>
      <button class="add-btn" onclick="openModal('wish')">+ Add item</button>
    </div>
    <div class="item-list" id="wish-list"></div>
  </div>

  <!-- EQUIPMENT I OWN -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">🔧 My Equipment <span class="count" id="equip-count">0</span></div>
      <button class="add-btn" onclick="openModal('equip')">+ Add item</button>
    </div>
    <div class="item-list" id="equip-list"></div>
  </div>

  <!-- NOTES -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">📝 Notes <span class="count" id="notes-count">0</span></div>
      <button class="add-btn" onclick="openModal('note')">+ Add note</button>
    </div>
    <div class="item-list" id="notes-list"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">Add item</h3>
    <div class="form-group"><label>Name</label><input type="text" id="f-name" placeholder="e.g. Hakko FX-888D"></div>
    <div class="form-group"><label>Notes</label><textarea id="f-note" placeholder="Any details..."></textarea></div>
    <div class="form-group" id="f-link-group"><label>Link (optional)</label><input type="url" id="f-link" placeholder="https://..."></div>
    <div class="form-group" id="f-priority-group"><label>Priority</label>
      <select id="f-priority">
        <option value="high">🔴 High</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="low">⚪ Low</option>
      </select>
    </div>
    <div class="form-group" id="f-cat-group"><label>Category</label>
      <select id="f-cat">
        <option value="Soldering">Soldering</option>
        <option value="3D Printing">3D Printing</option>
        <option value="Electronics">Electronics</option>
        <option value="Measurement">Measurement</option>
        <option value="Hand Tools">Hand Tools</option>
        <option value="Software">Software</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="save" onclick="saveItem()">Save</button>
    </div>
  </div><!-- end ptab-dashboard -->

  <!-- RESEARCH TAB -->
  <div id="ptab-research" style="display:none;">
    <div id="research-app">
      <p style="font-family:var(--mono);font-size:13px;color:var(--text3);">Loading research database...</p>
    </div>
  </div>

</div><!-- end main-content -->

<script>
const PASSWORD = 'SG';
let currentModal = null, editIndex = null;

// Storage helpers
function load(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } }
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

// Login
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('pwInput').addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });

function tryLogin() {
  const val = document.getElementById('pwInput').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    render();
    resDB = loadResDB();
  } else {
    const inp = document.getElementById('pwInput');
    inp.classList.add('error');
    document.getElementById('errMsg').textContent = 'Incorrect password.';
    setTimeout(() => { inp.classList.remove('error'); inp.value=''; }, 600);
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.getElementById('errMsg').textContent = '';
}

// Render
function render() {
  renderList('wish', load('wish'), renderWishItem);
  renderList('equip', load('equip'), renderEquipItem);
  renderList('note', load('notes'), renderNoteItem);
}

function renderList(key, items, renderFn) {
  const listId = key === 'note' ? 'notes-list' : key + '-list';
  const countId = key === 'note' ? 'notes-count' : key + '-count';
  const el = document.getElementById(listId);
  document.getElementById(countId).textContent = items.length;
  if (!items.length) { el.innerHTML = '<div class="empty-state">No items yet — click + to add</div>'; return; }
  el.innerHTML = items.map((item, i) => renderFn(item, i)).join('');
}

function priorityBadge(p) {
  const map = {high:'p-high',medium:'p-medium',low:'p-low'};
  const label = {high:'High priority',medium:'Medium',low:'Low'};
  return `<span class="priority-badge ${map[p]||'p-low'}">${label[p]||p}</span>`;
}

function renderWishItem(item, i) {
  return `<div class="item-row">
    <div class="item-body">
      <div class="item-name">${esc(item.name)}${item.cat ? ` <span style="font-size:10px;color:var(--text3);font-weight:400">· ${esc(item.cat)}</span>` : ''}</div>
      ${item.note ? `<div class="item-note">${esc(item.note)}</div>` : ''}
      ${item.link ? `<a class="item-link" href="${esc(item.link)}" target="_blank">🔗 Link ↗</a>` : ''}
    </div>
    <div class="item-actions">
      ${priorityBadge(item.priority)}
      <button class="icon-btn" onclick="editItem('wish',${i})">✏️</button>
      <button class="icon-btn del" onclick="deleteItem('wish',${i})">✕</button>
    </div>
  </div>`;
}

function renderEquipItem(item, i) {
  return `<div class="item-row">
    <div class="item-body">
      <div class="item-name">${esc(item.name)}${item.cat ? ` <span style="font-size:10px;color:var(--text3);font-weight:400">· ${esc(item.cat)}</span>` : ''}</div>
      ${item.note ? `<div class="item-note">${esc(item.note)}</div>` : ''}
      ${item.link ? `<a class="item-link" href="${esc(item.link)}" target="_blank">🔗 Link ↗</a>` : ''}
    </div>
    <div class="item-actions">
      <span class="owned-badge">✓ Owned</span>
      <button class="icon-btn" onclick="editItem('equip',${i})">✏️</button>
      <button class="icon-btn del" onclick="deleteItem('equip',${i})">✕</button>
    </div>
  </div>`;
}

function renderNoteItem(item, i) {
  return `<div class="item-row">
    <div class="item-body">
      <div class="item-name">${esc(item.name)}</div>
      ${item.note ? `<div class="item-note">${esc(item.note)}</div>` : ''}
      ${item.link ? `<a class="item-link" href="${esc(item.link)}" target="_blank">🔗 Link ↗</a>` : ''}
    </div>
    <div class="item-actions">
      <button class="icon-btn" onclick="editItem('note',${i})">✏️</button>
      <button class="icon-btn del" onclick="deleteItem('note',${i})">✕</button>
    </div>
  </div>`;
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Modal
function openModal(type, index = null) {
  currentModal = type; editIndex = index;
  const isNote = type === 'note';
  const isEquip = type === 'equip';
  document.getElementById('modal-title').textContent = index !== null ? 'Edit item' : (isNote ? 'Add note' : 'Add item');
  document.getElementById('f-priority-group').style.display = (isNote || isEquip) ? 'none' : 'block';
  document.getElementById('f-cat-group').style.display = isNote ? 'none' : 'block';

  if (index !== null) {
    const key = type === 'note' ? 'notes' : type;
    const item = load(key)[index];
    document.getElementById('f-name').value = item.name || '';
    document.getElementById('f-note').value = item.note || '';
    document.getElementById('f-link').value = item.link || '';
    document.getElementById('f-priority').value = item.priority || 'medium';
    document.getElementById('f-cat').value = item.cat || 'Other';
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-link').value = '';
    document.getElementById('f-priority').value = 'medium';
    document.getElementById('f-cat').value = 'Other';
  }
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const key = currentModal === 'note' ? 'notes' : currentModal;
  const items = load(key);
  const item = {
    name,
    note: document.getElementById('f-note').value.trim(),
    link: document.getElementById('f-link').value.trim(),
    priority: document.getElementById('f-priority').value,
    cat: document.getElementById('f-cat').value,
  };
  if (editIndex !== null) { items[editIndex] = item; } else { items.push(item); }
  save(key, items);
  closeModal(); render();
}

function deleteItem(type, i) {
  const key = type === 'note' ? 'notes' : type;
  const items = load(key);
  items.splice(i, 1);
  save(key, items);
  render();
}

function editItem(type, i) { openModal(type, i); }

// Close modal on bg click
