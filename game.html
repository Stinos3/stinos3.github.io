<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — Stijn Geerts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --text: #e6edf3; --text2: #8b949e; --text3: #656d76;
    --accent: #58a6ff; --accent2: #1f6feb; --green: #3fb950;
    --mono: 'JetBrains Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  header { width: 100%; border-bottom: 1px solid var(--border); padding: 0 2rem; background: rgba(13,17,23,0.92); backdrop-filter: blur(8px); }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { font-size: 14px; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .logo .prompt { color: var(--green); }
  .logo .cursor { display: inline-block; width: 8px; height: 14px; background: var(--accent); animation: blink 1.1s step-end infinite; vertical-align: middle; }
  @keyframes blink { 50% { opacity: 0; } }
  nav a { font-size: 12px; color: var(--text2); text-decoration: none; padding: 6px 12px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
  nav a:hover { color: var(--text); background: var(--bg3); }

  .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 3rem 1rem; width: 100%; }

  h1 { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }

  .scoreboard { display: flex; gap: 32px; }
  .score-item { text-align: center; }
  .score-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .score-val { font-size: 24px; font-weight: 700; color: var(--accent); }

  canvas {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg2);
    display: block;
    image-rendering: pixelated;
  }

  .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  button {
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--text); }
  button.primary { background: var(--accent2); border-color: var(--accent); color: #fff; }

  .hint { font-size: 11px; color: var(--text3); text-align: center; line-height: 1.8; }

  .overlay {
    position: absolute;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    background: rgba(13,17,23,0.88);
    border-radius: 8px;
    font-size: 13px; color: var(--text2);
  }
  .overlay .big { font-size: 20px; font-weight: 700; color: var(--text); }
  .canvas-wrap { position: relative; }

  /* Mobile d-pad */
  .dpad { display: none; gap: 6px; flex-direction: column; align-items: center; margin-top: 8px; }
  .dpad-row { display: flex; gap: 6px; }
  .dpad button { width: 52px; height: 52px; font-size: 18px; padding: 0; }
  @media (max-width: 540px) { .dpad { display: flex; } .hint { display: none; } }
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EFMKX23BD0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-EFMKX23BD0');
</script>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo"><span class="prompt">~/</span>stijn-geerts<span class="cursor"></span></a>
    <nav><a href="index.html">← back</a></nav>
  </div>
</header>

<div class="game-wrapper">
  <h1>🐍 SNAKE</h1>

  <div class="scoreboard">
    <div class="score-item"><div class="score-label">Score</div><div class="score-val" id="score">0</div></div>
    <div class="score-item"><div class="score-label">Best</div><div class="score-val" id="best">0</div></div>
    <div class="score-item"><div class="score-label">Level</div><div class="score-val" id="level">1</div></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="400" height="400"></canvas>
    <div class="overlay" id="overlay" style="inset:0;">
      <div class="big">SNAKE</div>
      <div>Use arrow keys or WASD</div>
      <button class="primary" id="startBtn">▶ Start game</button>
    </div>
  </div>

  <div class="controls">
    <button id="pauseBtn" disabled>⏸ Pause</button>
    <button id="restartBtn" disabled>↺ Restart</button>
  </div>

  <div class="hint">Arrow keys or WASD to move · P to pause · Eat food to grow &amp; speed up</div>

  <div class="dpad">
    <div class="dpad-row"><button id="up">▲</button></div>
    <div class="dpad-row"><button id="left">◀</button><button id="down">▼</button><button id="right">▶</button></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const GRID = 20, COLS = 20, ROWS = 20;
const COLORS = { snake: '#3fb950', snakeHead: '#58a6ff', food: '#f85149', grid: '#161b22', bg: '#161b22' };

let snake, dir, nextDir, food, score, running, paused, interval, best = 0;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; paused = false;
  placeFood();
  updateScore();
}

function placeFood() {
  do { food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===food.x && s.y===food.y));
}

function getSpeed() { return Math.max(60, 200 - Math.floor(score/5)*15); }
function getLevel() { return Math.floor(score/5)+1; }

function updateScore() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = getLevel();
}

function step() {
  dir = nextDir;
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++; if(score>best) best=score;
    updateScore();
    placeFood();
    clearInterval(interval);
    interval = setInterval(step, getSpeed());
  } else { snake.pop(); }
  draw();
}

function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid dots
  ctx.fillStyle = '#21262d';
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) { ctx.fillRect(x*GRID+9,y*GRID+9,2,2); }
  // food
  ctx.fillStyle = COLORS.food;
  ctx.beginPath();
  ctx.roundRect(food.x*GRID+2, food.y*GRID+2, GRID-4, GRID-4, 3);
  ctx.fill();
  // snake
  snake.forEach((s,i) => {
    ctx.fillStyle = i===0 ? COLORS.snakeHead : COLORS.snake;
    ctx.globalAlpha = i===0 ? 1 : Math.max(0.4, 1 - i*0.03);
    ctx.beginPath();
    ctx.roundRect(s.x*GRID+1, s.y*GRID+1, GRID-2, GRID-2, i===0?4:2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function gameOver() {
  clearInterval(interval); running = false;
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('restartBtn').disabled = false;
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `<div class="big">GAME OVER</div><div>Score: ${score} · Best: ${best}</div><button class="primary" onclick="startGame()">▶ Play again</button>`;
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('pauseBtn').disabled = false;
  document.getElementById('restartBtn').disabled = false;
  clearInterval(interval);
  init(); running = true; draw();
  interval = setInterval(step, getSpeed());
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶ Resume' : '⏸ Pause';
  if (paused) { clearInterval(interval); }
  else { interval = setInterval(step, getSpeed()); }
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('restartBtn').addEventListener('click', startGame);

const dirMap = {
  ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
  w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0}
};
document.addEventListener('keydown', e => {
  if (e.key==='p'||e.key==='P') { togglePause(); return; }
  const d = dirMap[e.key];
  if (d && !(d.x===-dir.x && d.y===-dir.y)) { nextDir=d; e.preventDefault(); }
});

// Mobile d-pad
document.getElementById('up').addEventListener('click',    () => { if(dir.y!==1)  nextDir={x:0,y:-1}; });
document.getElementById('down').addEventListener('click',  () => { if(dir.y!==-1) nextDir={x:0,y:1}; });
document.getElementById('left').addEventListener('click',  () => { if(dir.x!==1)  nextDir={x:-1,y:0}; });
document.getElementById('right').addEventListener('click', () => { if(dir.x!==-1) nextDir={x:1,y:0}; });

// Initial draw
init(); draw();
</script>
</body>
</html>
